# -- general -------------------------------------------------------------------

unbind C-b
set-option -g prefix C-a # remap prefix to 'C-a'

# -- Plugins -------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
# Better default settings
set -g @plugin 'hallazzang/tmux-reset'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Session management
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Theme
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'

# -- display -------------------------------------------------------------------

set -g base-index 1  # start windows numbering at 1
setw -g pane-base-index 1 # make pane numbering consistent with windows

setw -g automatic-rename on # rename window to reflect current program
set -g renumber-windows on # renumber windows when a window is closed

set -g set-titles on # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000 # slightly longer status messages display time

set -g status-interval 10 # redraw status line every 10 seconds

set -g mouse on # Enable mouse support

# -- Keybindings --------------------------------------------------------------

bind-key -n M-S-C-h select-pane -L
bind-key -n M-S-C-j select-pane -D
bind-key -n M-S-C-k select-pane -U
bind-key -n M-S-C-l select-pane -R

# -- Sesh integration ---------------------------------------------------------

# Don't exit tmux when closing a session — jump to next one
set -g detach-on-destroy off

# Kill pane without confirmation
bind-key x kill-pane

bind-key "T" display-popup -E -w 70% -h 70% -d '#{pane_current_path}' -T 'Sesh' \
  "sesh connect \"$(                                                       \
    sesh list -t --icons | fzf                                             \
      --no-sort --ansi --reverse --prompt '🪟  ' --border-label ' sesh '  \
      --header '  ^t tmux  ^a all  ^x zoxide  ^g configs  ^d kill'        \
      --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)'    \
      --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)'       \
      --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)'   \
      --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)'    \
      --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(🪟  )+reload(sesh list -t --icons)' \
      --preview 'sesh preview {}'                                          \
  )\""

# <prefix>+L — jump to previous session (fast toggle)
bind -N "last-session (via sesh)" L run-shell "sesh last"

# -- Worktrunk integration ----------------------------------------------------

# <prefix>+W — worktrunk list (quick agent dashboard)
bind-key "W" display-popup -E -w 70% -h 70% "wt list --full | less -R"

# -- Theme config ------------------------------------------------------------

# Configure Catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Configure Tmux styling
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# Pane border look and feel
setw -g pane-border-status bottom
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
